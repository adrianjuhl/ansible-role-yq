---

- name: Create download directory
  file:
    dest: "{{ adrianjuhl__yq__download_directory }}"
    state: directory
    mode: "u=rwx,go=rx"

- name: Download yq
  get_url:
    url: "{{ adrianjuhl__yq__source_directory }}/{{ adrianjuhl__yq__archive_filename }}"
    dest: "{{ adrianjuhl__yq__download_directory }}"
    checksum: "{{ adrianjuhl__yq__archive_file_checksum }}"
    force: no
    mode: "u=rw,go=r"

- name: Unarchive yq
  unarchive:
    src: "{{ adrianjuhl__yq__download_directory }}/{{ adrianjuhl__yq__archive_filename }}"
    dest: "{{ adrianjuhl__yq__download_directory }}"
    copy: false

- name: Copy yq into install directory
  ansible.builtin.copy:
    src: "{{ adrianjuhl__yq__download_directory }}/{{ adrianjuhl__yq__source_filename }}"
    dest: "{{ adrianjuhl__yq__install_bin_directory }}/yq"
    mode: "0755"



