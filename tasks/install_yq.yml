---

- name: Create download directory
  file:
    dest: "{{ adrianjuhl__yq__download_directory }}"
    state: directory
    mode: "u=rwx,go=rx"
  become: false

- name: Download yq
  get_url:
    url: "{{ adrianjuhl__yq__source_directory }}/{{ adrianjuhl__yq__archive_filename }}"
    dest: "{{ adrianjuhl__yq__download_directory }}"
    checksum: "sha512:{{ adrianjuhl__yq__archive_file_sha512_checksum }}"
    force: no
    mode: "u=rw,go=r"
  become: false
  when: adrianjuhl__yq__yq_file_sha512_checksum is defined

- name: Download yq
  get_url:
    url: "{{ adrianjuhl__yq__source_directory }}/{{ adrianjuhl__yq__archive_filename }}"
    dest: "{{ adrianjuhl__yq__download_directory }}"
    checksum: "sha512:abcd"
    force: no
    mode: "u=rw,go=r"
  become: false
  when: adrianjuhl__yq__yq_file_sha512_checksum is not defined

- name: Unarchive yq
  unarchive:
    src: "{{ adrianjuhl__yq__download_directory }}/{{ adrianjuhl__yq__archive_filename }}"
    dest: "{{ adrianjuhl__yq__download_directory }}"
    copy: false
  become: false

- name: Copy yq into install directory
  ansible.builtin.copy:
    src: "{{ adrianjuhl__yq__download_directory }}/{{ adrianjuhl__yq__source_filename }}"
    dest: "{{ adrianjuhl__yq__install_bin_directory }}/yq"
    mode: "0755"



